<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lanterns of Mournhollow</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #081018;
      overflow: hidden;
      font-family: Georgia, serif;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<script>
const GAME_WIDTH = 1280;
const GAME_HEIGHT = 720;
const WORLD_WIDTH = 2400;
const WORLD_HEIGHT = 1500;
const PLAYER_SPEED = 210;
const INTERACT_DISTANCE = 96;

const PATH = 'assets/';

class MournhollowScene extends Phaser.Scene {
  constructor() {
    super('MournhollowScene');

    this.gameStarted = false;
    this.dialogueActive = false;
    this.choiceActive = false;
    this.modalActive = false;
    this.currentChoices = [];
    this.selectedChoiceIndex = 0;
    this.currentDialogueLines = [];
    this.currentDialogueIndex = 0;
    this.currentDialogueMeta = null;
    this.currentLine = null;
    this.typewriterEvent = null;
    this.isTyping = false;
    this.fullLineText = '';
    this.nearestInteractable = null;

    this.questState = {
      talkedTo: { mara: false, iven: false, nomi: false },
      inspectedLantern: false,
      inspectedMural: false,
      sawPainting: false,
      finalUnlocked: false,
      endingSeen: false
    };

    this.journalEntries = [
      'You returned to Mournhollow during the Festival of Returning Lights.',
      'A letter in Sera\'s hand drew you back to the town that buried her story.',
      'Speak with Mara, Iven, and Nomi. Their memories do not agree.'
    ];

    this.objectiveTextValue = 'Speak with Mara, Iven, and Nomi.';
    this.playerFacing = 'down';
  }

  preload() {
    this.load.image('title_screen', PATH + 'title_mournhollow.png');
    this.load.image('logo', PATH + 'logo_mournhollow.png');

    this.load.image('portrait_lys', PATH + 'portrait_lys.png');
    this.load.image('portrait_mara', PATH + 'portrait_mara.png');
    this.load.image('portrait_iven', PATH + 'portrait_iven.png');
    this.load.image('portrait_nomi', PATH + 'portrait_nomi.png');
    this.load.image('portrait_sera', PATH + 'portrait_sera.png');

    this.load.spritesheet('sheet_lys', PATH + 'lys_player.png', { frameWidth: 256, frameHeight: 256 });
    this.load.spritesheet('sheet_mara', PATH + 'mara_sprite.png', { frameWidth: 256, frameHeight: 256 });
    this.load.spritesheet('sheet_iven', PATH + 'iven_sprite.png', { frameWidth: 256, frameHeight: 256 });
    this.load.spritesheet('sheet_nomi', PATH + 'nomi_sprite.png', { frameWidth: 512, frameHeight: 512 });

    this.load.image('bg_harbor_square', PATH + 'bg_harbor_square.png');
    this.load.image('bg_memorial_cliff', PATH + 'bg_memorial_cliff.png');
    this.load.image('hidden_sisters_painting', PATH + 'hidden_sisters_painting.png');

    this.load.image('tile_grass', PATH + 'tile_grass.png');
    this.load.image('tile_cobble', PATH + 'tile_cobble.png');
    this.load.image('tile_path', PATH + 'tile_path.png');
    this.load.image('tile_water', PATH + 'tile_water.png');

    this.load.image('house_archive', PATH + 'house_archive.png');
    this.load.image('house_dock', PATH + 'house_dock.png');
    this.load.image('house_belltower', PATH + 'house_belltower.png');
    this.load.image('altar', PATH + 'altar.png');
    this.load.image('lantern', PATH + 'lantern.png');
    this.load.image('memory_shard', PATH + 'memory_shard.png');
    this.load.image('lantern_post', PATH + 'lantern_post.png');

    this.load.image('ui_dialogue_box', PATH + 'ui_dialogue_box.png');
    this.load.image('ui_journal_panel', PATH + 'ui_journal_panel.png');
    this.load.image('ui_choice_arrow', PATH + 'ui_choice_arrow.png');
  }

  create() {
    this.createAnimations();
    this.createWorld();
    this.createCharacters();
    this.createCamera();
    this.createUI();
    this.createInput();
    this.refreshObjective();
    this.showTitleOverlay();
  }

  update() {
    this.updateFloatingPrompt();
    this.handleMovement();
    this.handleInteraction();
    this.updateWorldLabels();
    this.animateWater();
  }

  createAnimations() {
    ['lys', 'mara', 'iven'].forEach((name) => {
      this.anims.create({ key: name + '_walk_down', frames: this.anims.generateFrameNumbers('sheet_' + name, { start: 0, end: 3 }), frameRate: 7, repeat: -1 });
      this.anims.create({ key: name + '_walk_left', frames: this.anims.generateFrameNumbers('sheet_' + name, { start: 4, end: 7 }), frameRate: 7, repeat: -1 });
      this.anims.create({ key: name + '_walk_right', frames: this.anims.generateFrameNumbers('sheet_' + name, { start: 8, end: 11 }), frameRate: 7, repeat: -1 });
      this.anims.create({ key: name + '_walk_up', frames: this.anims.generateFrameNumbers('sheet_' + name, { start: 12, end: 15 }), frameRate: 7, repeat: -1 });
    });

    this.anims.create({ key: 'nomi_walk_down', frames: this.anims.generateFrameNumbers('sheet_nomi', { start: 0, end: 3 }), frameRate: 7, repeat: -1 });
    this.anims.create({ key: 'nomi_walk_left', frames: this.anims.generateFrameNumbers('sheet_nomi', { start: 4, end: 7 }), frameRate: 7, repeat: -1 });
    this.anims.create({ key: 'nomi_walk_right', frames: this.anims.generateFrameNumbers('sheet_nomi', { start: 8, end: 11 }), frameRate: 7, repeat: -1 });
    this.anims.create({ key: 'nomi_walk_up', frames: this.anims.generateFrameNumbers('sheet_nomi', { start: 12, end: 15 }), frameRate: 7, repeat: -1 });
  }

  createWorld() {
    this.cameras.main.setBackgroundColor('#081018');

    this.add.tileSprite(WORLD_WIDTH / 2, WORLD_HEIGHT / 2, WORLD_WIDTH, WORLD_HEIGHT, 'tile_grass').setAlpha(0.86).setDepth(0);
    this.waterTile = this.add.tileSprite(1925, WORLD_HEIGHT / 2, 950, WORLD_HEIGHT, 'tile_water').setDepth(0.2).setAlpha(0.96);
    this.add.tileSprite(700, 660, 850, 460, 'tile_cobble').setDepth(0.35).setAlpha(0.82);
    this.add.tileSprite(1090, 670, 1030, 160, 'tile_path').setDepth(0.36).setAlpha(0.9);
    this.add.tileSprite(560, 1040, 180, 360, 'tile_path').setDepth(0.36).setAlpha(0.92);
    this.add.tileSprite(1660, 430, 210, 360, 'tile_path').setDepth(0.36).setAlpha(0.92);

    this.add.image(700, 565, 'bg_harbor_square').setDisplaySize(1250, 830).setAlpha(0.25).setDepth(0.1);
    this.add.image(1810, 350, 'bg_memorial_cliff').setDisplaySize(1180, 760).setAlpha(0.36).setDepth(0.1);

    this.harborWell = this.add.ellipse(720, 665, 96, 96, 0x1b242d, 0.9).setDepth(2.5);
    this.harborWellRing = this.add.ellipse(720, 665, 118, 118).setStrokeStyle(8, 0x6a6f77, 1).setDepth(2.6);

    this.add.image(330, 295, 'house_archive').setScale(0.20).setDepth(3);
    this.add.image(1595, 785, 'house_dock').setScale(0.18).setDepth(3);
    this.add.image(405, 1175, 'house_belltower').setScale(0.18).setDepth(3.1);

    const lampPositions = [
      [530, 470], [760, 470], [995, 620], [1240, 620], [1510, 470], [565, 1100], [1685, 206],
      [640, 560], [885, 560], [1090, 730], [1490, 700], [350, 1070]
    ];

    this.lampGlows = [];
    lampPositions.forEach(([x, y]) => {
      this.add.image(x, y, 'lantern_post').setScale(0.15).setDepth(4.4);
      const glow = this.add.circle(x + 14, y - 60, 58, 0xffc96f, 0.14).setDepth(1.5);
      const core = this.add.circle(x + 14, y - 60, 7, 0xffdf9d, 0.95).setDepth(4.5);
      this.lampGlows.push(glow, core);
      this.tweens.add({ targets: [glow, core], alpha: { from: glow.alpha * 0.75, to: glow.alpha * 1.2 }, duration: 800 + Phaser.Math.Between(-150, 150), yoyo: true, repeat: -1 });
    });

    this.memorial = this.physics.add.staticImage(1715, 275, 'altar').setScale(0.20).setDepth(5);
    this.memorial.interactionType = 'memorial';
    this.memorial.interactionName = 'Cliff Memorial';

    this.oldLantern = this.physics.add.staticImage(862, 545, 'lantern').setScale(0.11).setDepth(5.1);
    this.oldLantern.interactionType = 'lantern';
    this.oldLantern.interactionName = 'Old Lantern';

    this.muralShard = this.physics.add.staticImage(1390, 565, 'memory_shard').setScale(0.17).setDepth(5.2);
    this.muralShard.interactionType = 'mural';
    this.muralShard.interactionName = 'Sea Wall Mural';

    this.tweens.add({ targets: this.muralShard, scaleX: 0.18, scaleY: 0.18, alpha: { from: 0.7, to: 1 }, duration: 1100, yoyo: true, repeat: -1 });

    this.locationLabels = [
      this.makeWorldLabel(330, 397, 'Archive House'),
      this.makeWorldLabel(1590, 930, 'North Docks'),
      this.makeWorldLabel(402, 1300, 'Bell Tower Garden'),
      this.makeWorldLabel(1715, 402, 'Memorial Cliff')
    ];

    this.obstacles = [];
    this.addObstacleRect(330, 325, 220, 170);
    this.addObstacleRect(1590, 815, 320, 180);
    this.addObstacleRect(405, 1190, 250, 190);
    this.addObstacleRect(1715, 290, 155, 110);
    this.addObstacleRect(720, 665, 120, 120);
    this.addObstacleRect(1160, 1000, 180, 180);
    this.addObstacleRect(1290, 980, 180, 200);
    this.addObstacleRect(265, 935, 130, 130);
    this.addObstacleRect(365, 990, 160, 120);

    this.rainParticles = [];
    for (let i = 0; i < 160; i++) {
      const line = this.add.rectangle(
        Phaser.Math.Between(0, WORLD_WIDTH),
        Phaser.Math.Between(0, WORLD_HEIGHT),
        2,
        Phaser.Math.Between(12, 18),
        0xa8d8ff,
        0.16
      ).setAngle(20).setDepth(20);
      this.rainParticles.push(line);
      this.tweens.add({
        targets: line,
        x: line.x - 26,
        y: line.y + 92,
        duration: Phaser.Math.Between(850, 1300),
        repeat: -1,
        onRepeat: (_, target) => {
          target.x = Phaser.Math.Between(0, WORLD_WIDTH);
          target.y = Phaser.Math.Between(-90, WORLD_HEIGHT);
        }
      });
    }
  }

  addObstacleRect(x, y, w, h) {
    const rect = this.add.rectangle(x, y, w, h, 0xff0000, 0);
    this.physics.add.existing(rect, true);
    this.obstacles.push(rect);
  }

  makeWorldLabel(x, y, text) {
    return this.add.text(x, y, text, {
      fontFamily: 'Georgia',
      fontSize: '18px',
      color: '#f5e8c9',
      backgroundColor: 'rgba(0,0,0,0.34)',
      padding: { left: 8, right: 8, top: 4, bottom: 4 }
    }).setOrigin(0.5).setDepth(30);
  }

  createCharacters() {
    this.player = this.physics.add.sprite(720, 810, 'sheet_lys', 0).setScale(0.28).setDepth(8);
    this.player.setCollideWorldBounds(true);
    this.player.body.setSize(86, 86).setOffset(85, 120);

    this.obstacles.forEach((ob) => this.physics.add.collider(this.player, ob));
    this.physics.add.collider(this.player, this.memorial);
    this.physics.add.collider(this.player, this.oldLantern);
    this.physics.add.collider(this.player, this.muralShard);

    this.npcs = [];

    const npcData = [
      { id: 'mara', x: 330, y: 500, texture: 'sheet_mara', scale: 0.28, name: 'Archivist Mara', portrait: 'portrait_mara' },
      { id: 'iven', x: 1510, y: 735, texture: 'sheet_iven', scale: 0.28, name: 'Ferryman Iven', portrait: 'portrait_iven' },
      { id: 'nomi', x: 555, y: 1035, texture: 'sheet_nomi', scale: 0.14, name: 'Nomi', portrait: 'portrait_nomi' }
    ];

    npcData.forEach((data) => {
      const npc = this.physics.add.staticSprite(data.x, data.y, data.texture, 0).setScale(data.scale).setDepth(8);
      npc.meta = data;
      npc.interactionType = 'npc';
      npc.interactionName = data.name;
      npc.nameLabel = this.makeWorldLabel(data.x, data.y - 50, data.name);
      this.npcs.push(npc);
      this.tweens.add({ targets: npc, y: npc.y - 4, duration: 1200 + Phaser.Math.Between(-200, 200), yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    });
  }

  createCamera() {
    this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
    this.cameras.main.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
    this.cameras.main.setZoom(1.03);
    this.cameras.main.setRoundPixels(true);
  }

  createUI() {
    this.objectiveBar = this.add.image(290, 44, 'ui_dialogue_box').setDisplaySize(520, 60).setAlpha(0.84).setScrollFactor(0).setDepth(100);
    this.objectiveText = this.add.text(40, 24, '', { fontFamily: 'Georgia', fontSize: '22px', color: '#f6efd8', fontStyle: 'bold' }).setScrollFactor(0).setDepth(101);
    this.controlsText = this.add.text(GAME_WIDTH - 20, 16, 'Move: Arrows / WASD   Talk: Space / Enter   Journal: J', { fontFamily: 'Georgia', fontSize: '17px', color: '#d2d9e6' }).setOrigin(1, 0).setScrollFactor(0).setDepth(101).setAlpha(0.85);

    this.interactPrompt = this.add.text(0, 0, 'SPACE', {
      fontFamily: 'Georgia',
      fontSize: '18px',
      color: '#ffffff',
      backgroundColor: '#000000',
      padding: { left: 10, right: 10, top: 6, bottom: 6 }
    }).setOrigin(0.5).setDepth(102).setVisible(false);

    this.journalPanel = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'ui_journal_panel').setDisplaySize(720, 580).setScrollFactor(0).setDepth(120).setVisible(false);
    this.journalTitle = this.add.text(250, 100, 'Journal', { fontFamily: 'Georgia', fontSize: '34px', color: '#ffe3a5', fontStyle: 'bold' }).setScrollFactor(0).setDepth(121).setVisible(false);
    this.journalBody = this.add.text(250, 160, '', { fontFamily: 'Georgia', fontSize: '23px', color: '#eef5ff', wordWrap: { width: 780 } }).setScrollFactor(0).setDepth(121).setVisible(false);

    this.leftPortrait = this.add.image(178, GAME_HEIGHT - 315, 'portrait_lys').setDisplaySize(270, 394).setScrollFactor(0).setDepth(130).setVisible(false);
    this.rightPortrait = this.add.image(GAME_WIDTH - 180, GAME_HEIGHT - 315, 'portrait_mara').setDisplaySize(270, 394).setScrollFactor(0).setDepth(130).setVisible(false);

    this.dialoguePanel = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT - 110, 'ui_dialogue_box').setDisplaySize(GAME_WIDTH - 70, 212).setScrollFactor(0).setDepth(131).setVisible(false);
    this.dialogueName = this.add.text(72, GAME_HEIGHT - 194, '', { fontFamily: 'Georgia', fontSize: '29px', fontStyle: 'bold', color: '#ffd98f' }).setScrollFactor(0).setDepth(132).setVisible(false);
    this.dialogueText = this.add.text(72, GAME_HEIGHT - 150, '', { fontFamily: 'Georgia', fontSize: '26px', color: '#ffffff', wordWrap: { width: GAME_WIDTH - 148 } }).setScrollFactor(0).setDepth(132).setVisible(false);
    this.dialogueHint = this.add.text(GAME_WIDTH - 84, GAME_HEIGHT - 40, 'SPACE', { fontFamily: 'Georgia', fontSize: '18px', color: '#d7dde8' }).setOrigin(1, 1).setScrollFactor(0).setDepth(132).setVisible(false);

    this.choiceArrows = [];
    this.choiceTexts = [];
    for (let i = 0; i < 3; i++) {
      const arrow = this.add.image(742, GAME_HEIGHT - 148 + i * 34, 'ui_choice_arrow').setDisplaySize(34, 12).setScrollFactor(0).setDepth(133).setVisible(false);
      const text = this.add.text(770, GAME_HEIGHT - 165 + i * 34, '', { fontFamily: 'Georgia', fontSize: '23px', color: '#ffffff' }).setScrollFactor(0).setDepth(133).setVisible(false);
      this.choiceArrows.push(arrow);
      this.choiceTexts.push(text);
    }

    this.fadeOverlay = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0).setScrollFactor(0).setDepth(200);

    this.titleBg = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'title_screen').setDisplaySize(GAME_WIDTH, GAME_HEIGHT).setScrollFactor(0).setDepth(210).setVisible(false);
    this.titleShade = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 0x02070a, 0.36).setScrollFactor(0).setDepth(211).setVisible(false);
    this.titleLogo = this.add.image(GAME_WIDTH / 2, 190, 'logo').setDisplaySize(760, 260).setScrollFactor(0).setDepth(212).setVisible(false);
    this.titleBody = this.add.text(GAME_WIDTH / 2, 410, 'A rain-soaked narrative RPG vertical slice.\nFind what the town chose to forget about Ember Night.', {
      fontFamily: 'Georgia',
      fontSize: '31px',
      color: '#eef4ff',
      align: 'center',
      stroke: '#000000',
      strokeThickness: 4
    }).setOrigin(0.5).setScrollFactor(0).setDepth(212).setVisible(false);
    this.titleHint = this.add.text(GAME_WIDTH / 2, 592, 'Press Enter, Space, or click to begin', { fontFamily: 'Georgia', fontSize: '25px', color: '#ffffff' }).setOrigin(0.5).setScrollFactor(0).setDepth(212).setVisible(false);

    this.artPanel = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'ui_journal_panel').setDisplaySize(860, 610).setScrollFactor(0).setDepth(220).setVisible(false);
    this.artTitle = this.add.text(GAME_WIDTH / 2, 82, '', { fontFamily: 'Georgia', fontSize: '32px', fontStyle: 'bold', color: '#ffe3a5' }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(221).setVisible(false);
    this.artImage = this.add.image(GAME_WIDTH / 2, 340, 'hidden_sisters_painting').setDisplaySize(280, 420).setScrollFactor(0).setDepth(221).setVisible(false);
    this.artCaption = this.add.text(GAME_WIDTH / 2, 560, '', { fontFamily: 'Georgia', fontSize: '22px', color: '#eef5ff', align: 'center', wordWrap: { width: 720 } }).setOrigin(0.5).setScrollFactor(0).setDepth(221).setVisible(false);
    this.artHint = this.add.text(GAME_WIDTH / 2, 645, 'Press Space', { fontFamily: 'Georgia', fontSize: '20px', color: '#dbe1eb' }).setOrigin(0.5).setScrollFactor(0).setDepth(221).setVisible(false);

    this.endingBg = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'bg_memorial_cliff').setDisplaySize(GAME_WIDTH, GAME_HEIGHT).setScrollFactor(0).setDepth(230).setVisible(false);
    this.endingShade = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 0x061018, 0.62).setScrollFactor(0).setDepth(231).setVisible(false);
    this.endingTitle = this.add.text(GAME_WIDTH / 2, 120, '', { fontFamily: 'Georgia', fontSize: '44px', fontStyle: 'bold', color: '#ffe1a3' }).setOrigin(0.5).setScrollFactor(0).setDepth(232).setVisible(false);
    this.endingBody = this.add.text(GAME_WIDTH / 2, 335, '', { fontFamily: 'Georgia', fontSize: '27px', color: '#eef5ff', align: 'center', wordWrap: { width: 860 } }).setOrigin(0.5).setScrollFactor(0).setDepth(232).setVisible(false);
    this.endingHint = this.add.text(GAME_WIDTH / 2, 625, 'Reload the page to see the other ending.', { fontFamily: 'Georgia', fontSize: '22px', color: '#ced7e2' }).setOrigin(0.5).setScrollFactor(0).setDepth(232).setVisible(false);
  }

  createInput() {
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys('W,A,S,D');
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this.jKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);

    this.input.on('pointerdown', () => {
      if (!this.gameStarted) {
        this.startGame();
        return;
      }
      if (this.dialogueActive && !this.choiceActive) {
        this.advanceDialogue();
      }
    });
  }

  showTitleOverlay() {
    [this.titleBg, this.titleShade, this.titleLogo, this.titleBody, this.titleHint].forEach((el) => el.setVisible(true));
    this.tweens.add({ targets: this.titleHint, alpha: { from: 0.35, to: 1 }, duration: 700, yoyo: true, repeat: -1 });
  }

  startGame() {
    if (this.gameStarted) return;
    this.gameStarted = true;
    [this.titleBg, this.titleShade, this.titleLogo, this.titleBody, this.titleHint].forEach((el) => el.setVisible(false));
    this.cameras.main.flash(400, 255, 236, 180);
  }

  refreshObjective() {
    this.objectiveText.setText('Objective: ' + this.objectiveTextValue);
    this.updateJournalText();
  }

  updateJournalText() {
    const lines = [];
    lines.push('Current objective: ' + this.objectiveTextValue + '\n');
    lines.push('Journal entries:');
    this.journalEntries.forEach((entry, index) => lines.push((index + 1) + '. ' + entry));
    this.journalBody.setText(lines.join('\n'));
  }

  updateWorldLabels() {
    const alpha = this.dialogueActive || this.modalActive ? 0.2 : 0.88;
    this.locationLabels.forEach((label) => label.setAlpha(alpha));
    this.npcs.forEach((npc) => npc.nameLabel.setAlpha(alpha));
  }

  animateWater() {
    if (!this.waterTile) return;
    this.waterTile.tilePositionX += 0.08;
    this.waterTile.tilePositionY += 0.02;
  }

  handleMovement() {
    if (!this.gameStarted || this.dialogueActive || this.modalActive || this.journalPanel.visible || this.questState.endingSeen) {
      if (this.player) this.player.setVelocity(0, 0);
      return;
    }

    let vx = 0;
    let vy = 0;
    if (this.cursors.left.isDown || this.wasd.A.isDown) vx = -1;
    else if (this.cursors.right.isDown || this.wasd.D.isDown) vx = 1;
    if (this.cursors.up.isDown || this.wasd.W.isDown) vy = -1;
    else if (this.cursors.down.isDown || this.wasd.S.isDown) vy = 1;

    const vec = new Phaser.Math.Vector2(vx, vy);
    if (vec.length() > 0) vec.normalize().scale(PLAYER_SPEED);
    this.player.setVelocity(vec.x, vec.y);

    if (vec.length() === 0) {
      this.player.anims.stop();
      const idleFrames = { down: 0, left: 4, right: 8, up: 12 };
      this.player.setFrame(idleFrames[this.playerFacing]);
      return;
    }

    if (Math.abs(vec.x) > Math.abs(vec.y)) {
      if (vec.x < 0) {
        this.playerFacing = 'left';
        this.player.anims.play('lys_walk_left', true);
      } else {
        this.playerFacing = 'right';
        this.player.anims.play('lys_walk_right', true);
      }
    } else {
      if (vec.y < 0) {
        this.playerFacing = 'up';
        this.player.anims.play('lys_walk_up', true);
      } else {
        this.playerFacing = 'down';
        this.player.anims.play('lys_walk_down', true);
      }
    }
  }

  updateFloatingPrompt() {
    if (!this.gameStarted || this.dialogueActive || this.modalActive || this.journalPanel.visible || this.questState.endingSeen) {
      this.interactPrompt.setVisible(false);
      return;
    }

    const candidates = [this.memorial, this.oldLantern, this.muralShard, ...this.npcs];
    let nearest = null;
    let nearestDist = Infinity;

    candidates.forEach((item) => {
      const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, item.x, item.y);
      if (dist < INTERACT_DISTANCE && dist < nearestDist) {
        nearest = item;
        nearestDist = dist;
      }
    });

    this.nearestInteractable = nearest;

    if (nearest) {
      this.interactPrompt.setPosition(nearest.x, nearest.y - 78);
      this.interactPrompt.setText('SPACE  ' + nearest.interactionName);
      this.interactPrompt.setVisible(true);
    } else {
      this.interactPrompt.setVisible(false);
    }
  }

  handleInteraction() {
    if (!this.gameStarted) {
      if (Phaser.Input.Keyboard.JustDown(this.enterKey) || Phaser.Input.Keyboard.JustDown(this.spaceKey)) this.startGame();
      return;
    }

    if (this.questState.endingSeen) return;

    if (this.modalActive) {
      if (Phaser.Input.Keyboard.JustDown(this.spaceKey) || Phaser.Input.Keyboard.JustDown(this.enterKey)) {
        this.closeArtModal();
      }
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.jKey) && !this.dialogueActive) {
      const visible = !this.journalPanel.visible;
      [this.journalPanel, this.journalTitle, this.journalBody].forEach((el) => el.setVisible(visible));
      return;
    }

    if (this.dialogueActive) {
      if (this.choiceActive) {
        if (Phaser.Input.Keyboard.JustDown(this.cursors.up) || Phaser.Input.Keyboard.JustDown(this.wasd.W)) {
          this.selectedChoiceIndex = Phaser.Math.Wrap(this.selectedChoiceIndex - 1, 0, this.currentChoices.length);
          this.refreshChoices();
        }
        if (Phaser.Input.Keyboard.JustDown(this.cursors.down) || Phaser.Input.Keyboard.JustDown(this.wasd.S)) {
          this.selectedChoiceIndex = Phaser.Math.Wrap(this.selectedChoiceIndex + 1, 0, this.currentChoices.length);
          this.refreshChoices();
        }
        if (Phaser.Input.Keyboard.JustDown(this.spaceKey) || Phaser.Input.Keyboard.JustDown(this.enterKey)) {
          this.confirmChoice();
        }
      } else if (Phaser.Input.Keyboard.JustDown(this.spaceKey) || Phaser.Input.Keyboard.JustDown(this.enterKey)) {
        this.advanceDialogue();
      }
      return;
    }

    if (!this.nearestInteractable) return;
    if (!Phaser.Input.Keyboard.JustDown(this.spaceKey) && !Phaser.Input.Keyboard.JustDown(this.enterKey)) return;

    const target = this.nearestInteractable;
    if (target.interactionType === 'npc') {
      this.interactWithNPC(target.meta.id);
    } else if (target.interactionType === 'lantern') {
      this.inspectLantern();
    } else if (target.interactionType === 'mural') {
      this.inspectMural();
    } else if (target.interactionType === 'memorial') {
      this.inspectMemorial();
    }
  }

  interactWithNPC(id) {
    if (id === 'mara') {
      const key = this.questState.talkedTo.mara ? 'mara_repeat' : 'mara_intro';
      this.startDialogue(this.getDialogue(key), {
        rightPortrait: 'portrait_mara',
        onComplete: () => {
          if (!this.questState.talkedTo.mara) {
            this.questState.talkedTo.mara = true;
            this.journalEntries.push('Mara says Sera confessed without fear, as if shielding someone else.');
            this.afterClueUpdate();
          }
        }
      });
    }

    if (id === 'iven') {
      const key = this.questState.talkedTo.iven ? 'iven_repeat' : 'iven_intro';
      this.startDialogue(this.getDialogue(key), {
        rightPortrait: 'portrait_iven',
        onComplete: () => {
          if (!this.questState.talkedTo.iven) {
            this.questState.talkedTo.iven = true;
            this.journalEntries.push('Iven ferried someone away before dawn and suspects the memorial hides the missing canvas.');
            this.afterClueUpdate();
          }
        }
      });
    }

    if (id === 'nomi') {
      const key = this.questState.talkedTo.nomi ? 'nomi_repeat' : 'nomi_intro';
      this.startDialogue(this.getDialogue(key), {
        rightPortrait: 'portrait_nomi',
        onComplete: () => {
          if (!this.questState.talkedTo.nomi) {
            this.questState.talkedTo.nomi = true;
            this.journalEntries.push('Nomi noticed a face hidden behind the cliff monument long before the adults did.');
            this.afterClueUpdate();
          }
        }
      });
    }
  }

  inspectLantern() {
    const key = this.questState.inspectedLantern ? 'lantern_repeat' : 'lantern_intro';
    this.startDialogue(this.getDialogue(key), {
      rightPortrait: 'portrait_sera',
      onComplete: () => {
        if (!this.questState.inspectedLantern) {
          this.questState.inspectedLantern = true;
          this.journalEntries.push('The cracked lantern smells of pigment and varnish, not only lamp oil.');
          this.afterClueUpdate();
        }
      }
    });
  }

  inspectMural() {
    const key = this.questState.inspectedMural ? 'mural_repeat' : 'mural_intro';
    this.startDialogue(this.getDialogue(key), {
      rightPortrait: 'portrait_sera',
      onComplete: () => {
        if (!this.questState.inspectedMural) {
          this.questState.inspectedMural = true;
          this.journalEntries.push('Beneath the rain-darkened mural, two sisters still remain under the lantern light.');
          this.afterClueUpdate();
          if (!this.questState.sawPainting) {
            this.questState.sawPainting = true;
            this.time.delayedCall(250, () => {
              this.showArtModal(
                'Recovered Underdrawing',
                'The sea wall was painted over, but the old image survives underneath: two sisters, one lantern, one memory the town tried to split in half.'
              );
            });
          }
        }
      }
    });
  }

  inspectMemorial() {
    if (!this.questState.finalUnlocked) {
      this.startDialogue(this.getDialogue('memorial_locked'), { rightPortrait: 'portrait_sera' });
      return;
    }
    this.startDialogue(this.getDialogue('memorial_finale'), { rightPortrait: 'portrait_sera' });
  }

  afterClueUpdate() {
    const solvedCount = [
      this.questState.talkedTo.mara,
      this.questState.talkedTo.iven,
      this.questState.talkedTo.nomi,
      this.questState.inspectedLantern,
      this.questState.inspectedMural
    ].filter(Boolean).length;

    if (!this.questState.finalUnlocked && solvedCount >= 4) {
      this.questState.finalUnlocked = true;
      this.objectiveTextValue = 'Go to the Cliff Memorial.';
      this.journalEntries.push('You know enough now. The cliff memorial is no shrine. It is a sealed answer.');
      this.cameras.main.flash(350, 255, 229, 170);
    }
    this.refreshObjective();
  }

  getDialogue(key) {
    const D = {
      mara_intro: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Mara. The square still smells of wet paper and lamp oil.' },
        { speakerName: 'Mara', portraitImageKey: 'portrait_mara', text: 'And you still begin with weather instead of accusation. Good. That means the city has not ruined you.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'I came because someone sent me a letter in Sera\'s hand.' },
        { speakerName: 'Mara', portraitImageKey: 'portrait_mara', text: 'Then someone wants the dead to start speaking again. Officially, Sera caused the fire at Lantern House. Unofficially... she confessed like someone choosing who would be spared.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Who did she spare?' },
        { speakerName: 'Mara', portraitImageKey: 'portrait_mara', text: 'That answer was buried before the ink dried. Ask Iven. He saw the shore before dawn.' }
      ],
      mara_repeat: [
        { speakerName: 'Mara', portraitImageKey: 'portrait_mara', text: 'When towns are frightened, they choose a story that lets breakfast happen the next morning.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'And the truth?' },
        { speakerName: 'Mara', portraitImageKey: 'portrait_mara', text: 'Truth arrives later. Wet. Unwelcome. Necessary.' }
      ],
      iven_intro: [
        { speakerName: 'Iven', portraitImageKey: 'portrait_iven', text: 'You stand on the dock the way your sister did. Like the wood is already trying to confess.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Mara said you ferried someone out after Ember Night.' },
        { speakerName: 'Iven', portraitImageKey: 'portrait_iven', text: 'I ferried two. One breathing. One almost gone. Sera handed me a wrapped canvas and told me not to let the sea take it.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Where is it now?' },
        { speakerName: 'Iven', portraitImageKey: 'portrait_iven', text: 'Inside the memorial stone, if my shame remembers correctly. Ask Nomi. Children notice what guilt tries to step around.' }
      ],
      iven_repeat: [
        { speakerName: 'Iven', portraitImageKey: 'portrait_iven', text: 'I have crossed rougher water than this. Never heavier silence.' }
      ],
      nomi_intro: [
        { speakerName: 'Nomi', portraitImageKey: 'portrait_nomi', text: 'They told me not to stare at the cliff. So of course I did.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'What did you see?' },
        { speakerName: 'Nomi', portraitImageKey: 'portrait_nomi', text: 'A crack behind the candles. A painted face in the stone. And your sister in dreams, asking why adults keep choosing the wrong memory.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Was Sera afraid?' },
        { speakerName: 'Nomi', portraitImageKey: 'portrait_nomi', text: 'No. She was sad for someone else. That is different.' }
      ],
      nomi_repeat: [
        { speakerName: 'Nomi', portraitImageKey: 'portrait_nomi', text: 'Adults hide truth in monuments because children still look behind them.' }
      ],
      lantern_intro: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'The brass is cracked... but this is not only soot.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Resin. Varnish. Painter\'s work. Someone used fire to destroy an image, not just a building.' }
      ],
      lantern_repeat: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'The lantern feels like evidence left out in the rain on purpose.' }
      ],
      mural_intro: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'The mural was repainted, but the underdrawing is still fighting its way through.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Two sisters beneath one lantern. The town erased one, then called the silence mercy.' }
      ],
      mural_repeat: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Paint remembers. It only waits for the top layer to tire.' }
      ],
      memorial_locked: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Not yet. If the stone is hiding something, I need the rest of the town inside me before I break it open.' }
      ],
      memorial_finale: [
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'The crack is real. Nomi was right.' },
        { speakerName: 'Sera', portraitImageKey: 'portrait_sera', text: 'At last.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'Sera?' },
        { speakerName: 'Sera', portraitImageKey: 'portrait_sera', text: 'Not a ghost. A memory sealed into canvas, stone, and grief. I took the blame because the fire began in another house, and another frightened family let me carry it.' },
        { speakerName: 'Lys', portraitImageKey: 'portrait_lys', text: 'You let them bury you inside a lie.' },
        { speakerName: 'Sera', portraitImageKey: 'portrait_sera', text: 'I let them survive one winter. But survival calcifies. Now you must decide what morning costs this town.', choiceType: 'ending', choices: [
          { id: 'truth', text: 'Tell Mournhollow the truth.' },
          { id: 'mercy', text: 'Protect the town. Keep Sera\'s sacrifice intact.' }
        ] }
      ]
    };
    return D[key];
  }

  startDialogue(lines, meta = {}) {
    if (!lines || !lines.length) return;
    this.dialogueActive = true;
    this.choiceActive = false;
    this.currentChoices = [];
    this.currentDialogueLines = lines;
    this.currentDialogueIndex = 0;
    this.currentDialogueMeta = meta;
    this.player.setVelocity(0, 0);

    this.leftPortrait.setTexture('portrait_lys');
    this.rightPortrait.setTexture(meta.rightPortrait || 'portrait_sera');

    [this.leftPortrait, this.rightPortrait, this.dialoguePanel, this.dialogueName, this.dialogueText, this.dialogueHint].forEach((el) => el.setVisible(true));
    this.showDialogueLine();
  }

  showDialogueLine() {
    this.hideChoices();
    this.currentLine = this.currentDialogueLines[this.currentDialogueIndex];
    if (!this.currentLine) return;

    this.dialogueName.setText(this.currentLine.speakerName);
    this.dialogueText.setText('');
    this.fullLineText = this.currentLine.text;
    this.isTyping = true;

    if (this.currentLine.portraitImageKey === 'portrait_lys') {
      this.leftPortrait.setAlpha(1).setScale(1);
      this.rightPortrait.setAlpha(0.34).setScale(0.96);
    } else {
      this.rightPortrait.setTexture(this.currentLine.portraitImageKey);
      this.rightPortrait.setAlpha(1).setScale(1);
      this.leftPortrait.setAlpha(0.34).setScale(0.96);
    }

    if (this.typewriterEvent) this.typewriterEvent.remove(false);
    let index = 0;
    this.typewriterEvent = this.time.addEvent({
      delay: 19,
      repeat: this.fullLineText.length - 1,
      callback: () => {
        index++;
        this.dialogueText.setText(this.fullLineText.slice(0, index));
        if (index >= this.fullLineText.length) {
          this.isTyping = false;
          this.typewriterEvent = null;
          if (this.currentLine.choices) this.showChoices(this.currentLine.choices);
        }
      }
    });
  }

  advanceDialogue() {
    if (!this.dialogueActive || this.choiceActive) return;

    if (this.isTyping) {
      if (this.typewriterEvent) this.typewriterEvent.remove(false);
      this.typewriterEvent = null;
      this.isTyping = false;
      this.dialogueText.setText(this.fullLineText);
      if (this.currentLine && this.currentLine.choices) this.showChoices(this.currentLine.choices);
      return;
    }

    this.currentDialogueIndex++;
    if (this.currentDialogueIndex >= this.currentDialogueLines.length) this.endDialogue();
    else this.showDialogueLine();
  }

  showChoices(choices) {
    this.choiceActive = true;
    this.currentChoices = choices;
    this.selectedChoiceIndex = 0;
    this.refreshChoices();
  }

  refreshChoices() {
    this.choiceTexts.forEach((txt, i) => {
      if (i < this.currentChoices.length) {
        txt.setText(this.currentChoices[i].text).setVisible(true).setColor(i === this.selectedChoiceIndex ? '#ffd98f' : '#ffffff');
        this.choiceArrows[i].setVisible(i === this.selectedChoiceIndex);
      } else {
        txt.setVisible(false);
        this.choiceArrows[i].setVisible(false);
      }
    });
  }

  hideChoices() {
    this.choiceActive = false;
    this.currentChoices = [];
    this.choiceTexts.forEach((t) => t.setVisible(false));
    this.choiceArrows.forEach((a) => a.setVisible(false));
  }

  confirmChoice() {
    const choice = this.currentChoices[this.selectedChoiceIndex];
    if (!choice) return;
    if (this.currentLine.choiceType === 'ending') {
      this.endDialogue(false);
      this.showEnding(choice.id);
    }
  }

  endDialogue(runCallback = true) {
    if (this.typewriterEvent) this.typewriterEvent.remove(false);
    this.typewriterEvent = null;
    this.dialogueActive = false;
    this.isTyping = false;
    this.hideChoices();
    [this.leftPortrait, this.rightPortrait, this.dialoguePanel, this.dialogueName, this.dialogueText, this.dialogueHint].forEach((el) => el.setVisible(false));

    if (runCallback && this.currentDialogueMeta && typeof this.currentDialogueMeta.onComplete === 'function') {
      this.currentDialogueMeta.onComplete();
    }

    this.currentDialogueMeta = null;
    this.currentDialogueLines = [];
    this.currentDialogueIndex = 0;
    this.currentLine = null;
  }

  showArtModal(title, caption) {
    this.modalActive = true;
    this.player.setVelocity(0, 0);
    this.artTitle.setText(title);
    this.artCaption.setText(caption);
    [this.fadeOverlay, this.artPanel, this.artTitle, this.artImage, this.artCaption, this.artHint].forEach((el) => el.setVisible(true));
    this.fadeOverlay.setAlpha(0.58);
  }

  closeArtModal() {
    this.modalActive = false;
    [this.artPanel, this.artTitle, this.artImage, this.artCaption, this.artHint].forEach((el) => el.setVisible(false));
    this.fadeOverlay.setAlpha(0);
  }

  showEnding(id) {
    this.questState.endingSeen = true;
    this.player.setVelocity(0, 0);

    let title = '';
    let body = '';
    if (id === 'truth') {
      title = 'Ending: The Morning That Opened';
      body = 'At dawn, Lys brings the hidden painting into the square.\n\nMournhollow does not shatter all at once. It fractures person by person, confession by confession. Mara reads the first correction aloud. Iven names the boat, the tide, the hour. Nomi watches the adults finally catch up.\n\nSera remains gone, but no longer erased. The town begins the harder life: the honest one.\n\nDemo complete.';
    } else {
      title = 'Ending: The Tender Lie';
      body = 'At dawn, Lys seals the crack and lets the memorial keep its silence.\n\nThe lanterns drift over black water, and the town survives another winter inside the story it already knows. Mara understands. Iven looks relieved, then smaller. Nomi says nothing, which is worse than anger.\n\nSera remains a sacrifice that protects the living, but the silence now belongs to Lys as well.\n\nDemo complete.';
    }

    this.endingTitle.setText(title);
    this.endingBody.setText(body);
    [this.fadeOverlay, this.endingBg, this.endingShade, this.endingTitle, this.endingBody, this.endingHint].forEach((el) => el.setVisible(true));
    this.fadeOverlay.setAlpha(0.5);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: GAME_WIDTH,
  height: GAME_HEIGHT,
  backgroundColor: '#081018',
  physics: {
    default: 'arcade',
    arcade: { debug: false }
  },
  scene: [MournhollowScene]
});
</script>
</body>
</html>
